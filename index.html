<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMGPROC // 图像处理工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">◈</span>
                    <span class="logo-text">IMGPROC</span>
                </div>
                <span class="version">v2.0</span>
            </header>

            <div class="upload-zone" id="uploadZone">
                <input type="file" id="fileInput" accept="image/*" hidden>
                <div class="upload-content">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <span class="upload-text">拖放或点击上传</span>
                    <span class="upload-hint">PNG / JPG / BMP / GIF / WebP</span>
                </div>
            </div>

            <nav class="tools-nav">
                <div class="tool-section">
                    <h3 class="section-title">
                        <span class="section-icon">⬡</span>
                        基础操作
                    </h3>
                    <div class="tool-grid">
                        <button class="tool-btn" id="rotateLeftBtn" title="向左旋转90°">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M2.5 2v6h6M2.66 15.57a10 10 0 1 0 .57-8.38"/>
                            </svg>
                            <span>左旋</span>
                        </button>
                        <button class="tool-btn" id="rotateRightBtn" title="向右旋转90°">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38"/>
                            </svg>
                            <span>右旋</span>
                        </button>
                        <button class="tool-btn" id="flipHBtn" title="水平翻转">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M8 3H5a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h3M16 3h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-3M12 20v2M12 14v2M12 8v2M12 2v2"/>
                            </svg>
                            <span>水平翻转</span>
                        </button>
                        <button class="tool-btn" id="flipVBtn" title="垂直翻转">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 8V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v3M3 16v3a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-3M20 12h2M14 12h2M8 12h2M2 12h2"/>
                            </svg>
                            <span>垂直翻转</span>
                        </button>
                    </div>
                    <button class="action-btn" id="applyBasic">
                        <span>应用调整</span>
                    </button>
                </div>

                <div class="tool-section">
                    <h3 class="section-title">
                        <span class="section-icon">▣</span>
                        像素画转换
                    </h3>
                    <div class="control-group">
                        <label class="control-label">
                            <span>像素尺寸</span>
                            <span class="control-value" id="pixelSizeValue">64</span>
                        </label>
                        <input type="range" class="slider" id="pixelSize" min="16" max="256" value="64">
                    </div>
                    <div class="control-group">
                        <label class="control-label">
                            <span>颜色数量</span>
                            <span class="control-value" id="colorReductionValue">128</span>
                        </label>
                        <input type="range" class="slider" id="colorReduction" min="16" max="256" value="128">
                    </div>
                    <div class="control-group">
                        <label class="control-label">输出缩放</label>
                        <input type="text" class="input-field" id="scaleFactor" placeholder="留空保持原尺寸">
                    </div>
                    <div class="control-row">
                        <label class="checkbox-label">
                            <input type="checkbox" id="enhanceMode" checked>
                            <span class="checkbox-custom"></span>
                            增强模式
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="preserveAspect" checked>
                            <span class="checkbox-custom"></span>
                            保持比例
                        </label>
                    </div>
                    <button class="action-btn primary" id="processPixelArt">
                        <span>执行转换</span>
                    </button>
                </div>

                <div class="tool-section">
                    <h3 class="section-title">
                        <span class="section-icon">◐</span>
                        画质增强
                    </h3>
                    <div class="control-group">
                        <label class="control-label">
                            <span>锐化强度</span>
                            <span class="control-value" id="sharpnessValue">1.50</span>
                        </label>
                        <input type="range" class="slider" id="sharpness" min="0.1" max="3.0" step="0.05" value="1.5">
                    </div>
                    <div class="control-group">
                        <label class="control-label">
                            <span>对比度</span>
                            <span class="control-value" id="contrastValue">1.10</span>
                        </label>
                        <input type="range" class="slider" id="contrast" min="0.5" max="1.5" step="0.05" value="1.1">
                    </div>
                    <div class="control-group">
                        <label class="control-label">
                            <span>饱和度</span>
                            <span class="control-value" id="saturationValue">1.05</span>
                        </label>
                        <input type="range" class="slider" id="saturation" min="0.5" max="1.3" step="0.05" value="1.05">
                    </div>
                    <div class="control-group">
                        <label class="control-label">放大倍数</label>
                        <input type="text" class="input-field" id="upscaleFactor" placeholder="留空不放大">
                    </div>
                    <label class="checkbox-label">
                        <input type="checkbox" id="denoise" checked>
                        <span class="checkbox-custom"></span>
                        去噪处理
                    </label>
                    <button class="action-btn primary" id="processEnhance">
                        <span>执行增强</span>
                    </button>
                </div>

                <div class="tool-section">
                    <h3 class="section-title">
                        <span class="section-icon">⬢</span>
                        实用工具
                    </h3>
                    <div class="control-group">
                        <label class="control-label">水印文字</label>
                        <input type="text" class="input-field" id="watermarkText" placeholder="输入水印内容">
                    </div>
                    <div class="control-row">
                        <div class="control-group half">
                            <label class="control-label">位置</label>
                            <select class="select-field" id="watermarkPosition">
                                <option value="bottom-right">右下</option>
                                <option value="bottom-left">左下</option>
                                <option value="top-right">右上</option>
                                <option value="top-left">左上</option>
                                <option value="center">居中</option>
                            </select>
                        </div>
                        <div class="control-group half">
                            <label class="control-label">
                                <span>透明度</span>
                                <span class="control-value" id="watermarkOpacityValue">0.5</span>
                            </label>
                            <input type="range" class="slider" id="watermarkOpacity" min="0.1" max="1.0" step="0.1" value="0.5">
                        </div>
                    </div>
                    <button class="action-btn" id="applyWatermark">
                        <span>添加水印</span>
                    </button>
                    
                    <div class="divider"></div>
                    
                    <div class="control-row">
                        <div class="control-group half">
                            <label class="control-label">输出格式</label>
                            <select class="select-field" id="outputFormat">
                                <option value="png">PNG</option>
                                <option value="jpeg">JPEG</option>
                                <option value="webp">WebP</option>
                            </select>
                        </div>
                        <div class="control-group half">
                            <label class="control-label">
                                <span>质量</span>
                                <span class="control-value" id="outputQualityValue">90%</span>
                            </label>
                            <input type="range" class="slider" id="outputQuality" min="0.1" max="1.0" step="0.1" value="0.9">
                        </div>
                    </div>
                    <button class="action-btn warning" id="compressImage">
                        <span>压缩转换</span>
                    </button>
                </div>
            </nav>

            <footer class="sidebar-footer">
                <button class="reset-btn" id="resetBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                    </svg>
                    <span>重置</span>
                </button>
            </footer>
        </aside>

        <main class="main-area">
            <div class="canvas-container" id="canvasContainer">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">◈</div>
                    <h2>上传图片开始处理</h2>
                    <p>支持 PNG, JPG, BMP, GIF, WebP 格式</p>
                </div>
                
                <div class="preview-grid" id="previewGrid" style="display: none;">
                    <div class="preview-panel">
                        <div class="panel-header">
                            <span class="panel-title">ORIGINAL</span>
                            <span class="panel-info" id="originalInfo">--</span>
                        </div>
                        <div class="panel-body">
                            <canvas id="originalCanvas"></canvas>
                        </div>
                    </div>
                    <div class="preview-panel result">
                        <div class="panel-header">
                            <span class="panel-title">OUTPUT</span>
                            <span class="panel-info" id="resultInfo">--</span>
                        </div>
                        <div class="panel-body">
                            <canvas id="resultCanvas"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bottom-bar" id="bottomBar" style="display: none;">
                <div class="format-selector">
                    <label>导出格式</label>
                    <select id="downloadFormat">
                        <option value="png">PNG</option>
                        <option value="jpeg">JPEG</option>
                        <option value="webp">WebP</option>
                    </select>
                </div>
                <button class="download-btn" id="downloadBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <span>下载结果</span>
                </button>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
